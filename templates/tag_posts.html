{% extends 'base.html' %}
{% block title %}{{ tag.tag_content }} tag list{% endblock %}
{% block content %}
<h1>#{{ tag.tag_content }}</h1>
<ul>
{% for post in posts %}
    <li><a href="{% url 'post_detail' pk=post.pk %}">{{ post.post_title }}</a> - {{ post.post_author.username }}</li>
{% empty %}
    <li>None</li>
{% endfor %}
</ul>
{% endblock %}
